name: RFP Text Pipeline

on:
  workflow_dispatch:
    inputs:
      max_api_calls:
        description: "Cap on paginated search calls this run (each call returns up to 1000 opps)"
        required: false
        default: "50"
      start_date:
        description: "First-run window start YYYY-MM-DD (ignored if state already has a cursor)"
        required: false
        default: ""
      dry_run:
        description: "Probe first page only; no downloads"
        type: boolean
        default: false
      force_window_start:
        description: "Override all state and scan from this date YYYY-MM-DD (backfill). Leave blank for normal run."
        required: false
        default: ""
  schedule:
    - cron: "5 0 * * *"  # 00:05 UTC daily — a few minutes after SAM's
                          # midnight-UTC quota reset (≈ 8:05 PM ET)

permissions:
  contents: write

concurrency:
  group: rfp-text
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 300

    env:
      CF_R2_ACCOUNT_ID: ${{ secrets.CF_R2_ACCOUNT_ID }}
      CF_R2_BUCKET: ${{ secrets.CF_R2_BUCKET }}
      CF_R2_ACCESS_KEY_ID: ${{ secrets.CF_R2_ACCESS_KEY_ID }}
      CF_R2_SECRET_ACCESS_KEY: ${{ secrets.CF_R2_SECRET_ACCESS_KEY }}
      SAM_API_KEY: ${{ secrets.SAM_API_KEY }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run RFP text pipeline
        run: |
          ARGS="--max-api-calls ${{ inputs.max_api_calls || '50' }} --summary-file $GITHUB_STEP_SUMMARY"
          if [ -n "${{ inputs.force_window_start }}" ]; then
            ARGS="$ARGS --force-window-start ${{ inputs.force_window_start }}"
          elif [ -n "${{ inputs.start_date }}" ]; then
            ARGS="$ARGS --start-date ${{ inputs.start_date }}"
          fi
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          python rfp_text_pipeline.py $ARGS

      # Rebuild even when the pipeline exited 1 (e.g. SAM 429 mid-window) —
      # bundles already pushed to R2 this run should still make it to the dashboard.
      - name: Rebuild dashboard JSONs from R2
        if: always() && inputs.dry_run != 'true'
        run: python build_rfp_signals.py

      - name: Rebuild combined RFP+contracts table
        if: always() && inputs.dry_run != 'true'
        run: python build_combined_table.py

      - name: Commit updated dashboard JSONs
        if: always() && inputs.dry_run != 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add web/data/rfp_signals.json web/data/rfp_bundles.json web/data/combined_table.json
          if git diff --cached --quiet; then
            echo "No dashboard changes to commit."
          else
            git commit -m "Rebuild RFP dashboard JSONs [skip ci]"
            git push
          fi
